<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Market | Digital Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00d4ff;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Dil Seçeneği Butonları */
        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .lang-btn {
            background: var(--card-bg);
            border: 1px solid var(--primary-color);
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            text-decoration: none;
        }

        .lang-btn:hover {
            background: var(--primary-color);
            color: black;
        }

        header {
            text-align: center;
            padding: 50px 20px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 90%;
            padding-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
            border-color: var(--primary-color);
        }

        .card i {
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .card h3 { margin: 10px 0; font-size: 1.5rem; }
        .card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        .price { font-size: 1.8rem; font-weight: bold; color: #fff; margin-bottom: 20px; display: block; }

        .buy-btn {
            background: var(--primary-color);
            color: #000;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        .buy-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="language-switcher">
        <a href="#" class="lang-btn" onclick="switchLang('tr')">🇹🇷 TR</a>
        <a href="#" class="lang-btn" onclick="switchLang('en')">🇬🇧 EN</a>
    </div>

    <header>
        <h1 id="title">Frost Market</h1>
        <p id="subtitle">Kalitenin ve Güvenin Tek Adresi</p>
    </header>

    <div class="container">
        <div class="card">
            <i class="fas fa-box-open"></i>
            <h3 class="p-name">Frost Pack (Basic)</h3>
            <p class="p-desc">Giriş seviyesi dijital avantajlar paketi.</p>
            <span class="price">2.00 £</span>
            <a href="https://buy.stripe.com/28E00lakQfx44bVaeV" class="buy-btn b-text">Satın Al</a>
        </div>

        <div class="card">
            <i class="fas fa-gem"></i>
            <h3 class="p-name">Frost Plus (Pro)</h3>
            <p class="p-desc">Daha fazla özellik ve öncelikli destek.</p>
            <span class="price">5.00 £</span>
            <a href="https://buy.stripe.com/28E00lakQfx44bVaeW" class="buy-btn b-text">Satın Al</a>
        </div>

        <div class="card">
            <i class="fas fa-crown"></i>
            <h3 class="p-name">Frost Ultra</h3>
            <p class="p-desc">En üst seviye deneyim ve sınırsız erişim.</p>
            <span class="price">10.00 £</span>
            <a href="https://buy.stripe.com/28E00lakQfx44bVaeU" class="buy-btn b-text">Satın Al</a>
        </div>
    </div>

    <script>
        const translations = {
            tr: {
                title: "Frost Market",
                subtitle: "Kalitenin ve Güvenin Tek Adresi",
                p_names: ["Frost Pack (Basic)", "Frost Plus (Pro)", "Frost Ultra"],
                p_descs: ["Giriş seviyesi dijital avantajlar paketi.", "Daha fazla özellik ve öncelikli destek.", "En üst seviye deneyim ve sınırsız erişim."],
                b_text: "Satın Al"
            },
            en: {
                title: "Frost Market",
                subtitle: "The Only Address for Quality and Trust",
                p_names: ["Frost Pack (Basic)", "Frost Plus (Pro)", "Frost Ultra"],
                p_descs: ["Entry-level digital advantage package.", "More features and priority support.", "Premium experience and unlimited access."],
                b_text: "Buy Now"
            }
        };

        function switchLang(lang) {
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('subtitle').innerText = translations[lang].subtitle;
            
            const names = document.querySelectorAll('.p-name');
            const descs = document.querySelectorAll('.p-desc');
            const buttons = document.querySelectorAll('.b-text');

            names.forEach((el, index) => el.innerText = translations[lang].p_names[index]);
            descs.forEach((el, index) => el.innerText = translations[lang].p_descs[index]);
            buttons.forEach(el => el.innerText = translations[lang].b_text);
        }
    </script>
</body>
</html>
