<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Market | Digital Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Dil Seçici */
        .language-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        .lang-btn {
            background: var(--card);
            border: 1px solid var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .lang-btn:hover { background: var(--primary); color: black; }

        header { text-align: center; padding: 60px 20px; }
        h1 { color: var(--primary); font-size: 3.5rem; margin: 0; text-shadow: 0 0 15px rgba(0,212,255,0.4); }
        
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1100px;
            width: 95%;
            padding-bottom: 100px;
        }
        .card {
            background: var(--card);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .price { display: block; font-size: 2rem; margin: 15px 0; font-weight: bold; }
        .buy-btn {
            background: var(--primary);
            color: #000;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            display: block;
            transition: 0.2s;
        }
        .buy-btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div class="language-container">
        <button class="lang-btn" onclick="setLang('tr')">🇹🇷 TR</button>
        <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
    </div>

    <header>
        <h1 id="main-title">Frost Market</h1>
        <p id="main-desc">Kaliteli Dijital Hizmetler</p>
    </header>

    <div class="container" id="product-container">
        </div>

    <script>
        const products = [
            { id: 1, nameTr: "Frost Pack", nameEn: "Frost Pack", price: "2.00", link: "https://buy.stripe.com/28E00lakQfx44bVaeV", icon: "fa-box" },
            { id: 2, nameTr: "Frost Lite", nameEn: "Frost Lite", price: "5.00", link: "https://buy.stripe.com/28E00lakQfx44bVaeW", icon: "fa-bolt" },
            { id: 3, nameTr: "Frost Plus", nameEn: "Frost Plus", price: "10.00", link: "https://buy.stripe.com/28E00lakQfx44bVaeU", icon: "fa-gem" },
            { id: 4, nameTr: "Frost Ultra", nameEn: "Frost Ultra", price: "20.00", link: "https://buy.stripe.com/28E00lakQfx44bVaeX", icon: "fa-crown" }
        ];

        function renderProducts(lang) {
            const container = document.getElementById('product-container');
            const title = document.getElementById('main-title');
            const desc = document.getElementById('main-desc');
            
            title.innerText = "Frost Market";
            desc.innerText = lang === 'tr' ? "Kaliteli Dijital Hizmetler" : "Premium Digital Services";
            
            container.innerHTML = "";
            products.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <i class="fas ${p.icon}"></i>
                        <h3>${lang === 'tr' ? p.nameTr : p.nameEn}</h3>
                        <span class="price">£${p.price}</span>
                        <a href="${p.link}" class="buy-btn">${lang === 'tr' ? 'Satın Al' : 'Buy Now'}</a>
                    </div>
                `;
            });
        }

        function setLang(lang) {
            renderProducts(lang);
        }

        // İlk açılışta Türkçe göster
        renderProducts('tr');
    </script>
</body>
</html>
