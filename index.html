<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Market | Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --dark: #020617; --card: #0f172a; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--dark); color: white; margin: 0; min-height: 100vh; }
        
        nav { display: flex; justify-content: space-between; padding: 20px 8%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 1.8rem; color: var(--neon); text-shadow: 0 0 10px var(--neon); letter-spacing: 2px; }
        
        .lang-control button { background: transparent; border: 1px solid var(--neon); color: white; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-family: 'Orbitron'; margin-left: 10px; transition: 0.3s; }
        .lang-control button:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        header { text-align: center; padding: 80px 20px; }
        h1 { font-family: 'Orbitron'; font-size: clamp(2rem, 8vw, 4rem); margin: 0; background: linear-gradient(to right, #fff, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { font-size: 1.2rem; opacity: 0.8; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1300px; margin: 0 auto; padding: 40px 20px 100px; }
        
        .card { background: var(--card); border-radius: 20px; padding: 35px; text-align: center; border: 1px solid rgba(0, 212, 255, 0.1); transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); }
        .card i { font-size: 3.5rem; color: var(--neon); margin-bottom: 20px; filter: drop-shadow(0 0 8px var(--neon)); }
        
        .card h3 { font-family: 'Orbitron'; font-size: 1.6rem; margin: 10px 0; }
        .card p { font-size: 1rem; color: #94a3b8; min-height: 60px; line-height: 1.5; }
        
        .price { font-size: 3rem; font-weight: 700; display: block; margin: 20px 0; font-family: 'Orbitron'; }
        .price span { font-size: 1.2rem; color: var(--neon); vertical-align: super; }

        .buy-btn { display: block; background: var(--neon); color: black; text-decoration: none; padding: 18px; border-radius: 10px; font-weight: 800; font-family: 'Orbitron'; transition: 0.3s; text-transform: uppercase; }
        .buy-btn:hover { background: white; transform: scale(1.05); box-shadow: 0 0 20px white; }

        .badge { position: absolute; top: 15px; right: 15px; background: #ff0055; color: white; padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">FROST MARKET</div>
        <div class="lang-control">
            <button onclick="changeLang('tr')">TR</button>
            <button onclick="changeLang('en')">EN</button>
        </div>
    </nav>

    <header>
        <h1 id="h-title">FROST MARKET</h1>
        <p id="h-sub">Yüksek Kaliteli Dijital Hizmetler ve Güvenli Ödeme</p>
    </header>

    <div class="grid" id="main-grid"></div>

    <script>
        const products = [
            { trN: "Frost Pack", enN: "Frost Pack", p: "2.00", icon: "fa-box", link: "3cI00lboUckSdMveuE", trD: "Başlangıç için temel dijital set. Hızlı aktivasyon.", enD: "Essential digital starter set. Fast activation." },
            { trN: "Frost Lite", enN: "Frost Lite", p: "5.00", icon: "fa-bolt", link: "28E00lakQfx44bVaeW", trD: "Daha fazla esneklik ve optimize edilmiş performans.", enD: "More flexibility and optimized performance." },
            { trN: "Frost Plus", enN: "Frost Plus", p: "10.00", icon: "fa-gem", link: "28E00lakQfx44bVaeU", trD: "Profesyonel özellikler ve öncelikli destek hattı.", enD: "Professional features and priority support line." },
            { trN: "Frost Ultra", enN: "Frost Ultra", p: "20.00", icon: "fa-crown", link: "28E00lakQfx44bVaeX", trD: "En popüler VIP paket. Sınırsız özellik ve hız.", enD: "Most popular VIP package. Unlimited features and speed.", hot: true },
            { trN: "Frost Elite", enN: "Frost Elite", p: "50.00", icon: "fa-shield-halved", link: "28E00lakQfx44bVaeY", trD: "Maksimum güvenlik ve tam kontrol deneyimi.", enD: "Maximum security and full control experience." },
            { trN: "Frost God", enN: "Frost God", p: "100.00", icon: "fa-dragon", link: "28E00lakQfx44bVaeZ", trD: "Sınırsız güç. Ömür boyu tam erişim yetkisi.", enD: "Infinite power. Full lifetime access authorization." }
        ];

        function changeLang(lang) {
            document.getElementById('h-sub').innerText = lang === 'tr' ? "Yüksek Kaliteli Dijital Hizmetler ve Güvenli Ödeme" : "High Quality Digital Services & Secure Payment";
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            
            products.forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        ${item.hot ? '<div class="badge">HOT</div>' : ''}
                        <i class="fas ${item.icon}"></i>
                        <h3>${lang === 'tr' ? item.trN : item.enN}</h3>
                        <p>${lang === 'tr' ? item.trD : item.enD}</p>
                        <span class="price"><span>£</span>${item.p}</span>
                        <a href="https://buy.stripe.com/${item.link}?quantity=1" class="buy-btn" target="_blank">${lang === 'tr' ? 'SATIN AL' : 'BUY NOW'}</a>
                    </div>
                `;
            });
        }
        changeLang('tr');
    </script>
</body>
</html>
