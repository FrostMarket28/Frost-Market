<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Market | Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00d4ff; --s: #7000ff; --bg: #050b18; --c: rgba(255,255,255,0.05); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        /* Dil Paneli */
        .nav-bar { display: flex; justify-content: space-between; padding: 20px 5%; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron'; color: var(--p); font-size: 1.5rem; }
        .lang-btns button { background: none; border: 1px solid var(--p); color: white; padding: 5px 15px; cursor: pointer; border-radius: 5px; margin-left: 5px; }
        
        header { padding: 60px 20px; }
        h1 { font-family: 'Orbitron'; font-size: 3.5rem; background: linear-gradient(to right, var(--p), var(--s)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Modern Kartlar */
        .card { background: var(--c); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--p); box-shadow: 0 0 20px rgba(0,212,255,0.2); }
        .card i { font-size: 3rem; color: var(--p); margin-bottom: 20px; }
        .price { font-size: 2.5rem; font-weight: bold; margin: 20px 0; display: block; }
        
        .btn { display: block; background: linear-gradient(45deg, var(--p), var(--s)); color: white; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
        .btn:hover { filter: brightness(1.2); }
        p.desc { color: #a0aec0; min-height: 45px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="logo">FROST</div>
        <div class="lang-btns">
            <button onclick="changeLang('tr')">TR</button>
            <button onclick="changeLang('en')">EN</button>
        </div>
    </div>

    <header>
        <h1 id="title">FROST MARKET</h1>
        <p id="subtitle">Profesyonel Dijital Çözümler</p>
    </header>

    <div class="grid" id="products"></div>

    <script>
        const data = {
            tr: {
                sub: "Profesyonel Dijital Çözümler",
                buy: "SATIN AL",
                items: [
                    { name: "Frost Pack", price: "2", desc: "Temel başlangıç paketi, hızlı teslimat.", icon: "fa-cube", link: "https://buy.stripe.com/28E00lakQfx44bVaeV" },
                    { name: "Frost Lite", price: "5", desc: "Orta seviye özellikler ve öncelikli erişim.", icon: "fa-bolt", link: "https://buy.stripe.com/28E00lakQfx44bVaeW" },
                    { name: "Frost Plus", price: "10", desc: "Gelişmiş paket, özel destek ve ekstra özellikler.", icon: "fa-gem", link: "https://buy.stripe.com/28E00lakQfx44bVaeU" },
                    { name: "Frost Ultra", price: "20", desc: "Sınırsız VIP erişim ve tüm özellikler dahil.", icon: "fa-crown", link: "https://buy.stripe.com/28E00lakQfx44bVaeX" }
                ]
            },
            en: {
                sub: "Professional Digital Solutions",
                buy: "BUY NOW",
                items: [
                    { name: "Frost Pack", price: "2", desc: "Basic starter pack, instant delivery.", icon: "fa-cube", link: "https://buy.stripe.com/28E00lakQfx44bVaeV" },
                    { name: "Frost Lite", price: "5", desc: "Mid-tier features and priority access.", icon: "fa-bolt", link: "https://buy.stripe.com/28E00lakQfx44bVaeW" },
                    { name: "Frost Plus", price: "10", desc: "Advanced package, premium support.", icon: "fa-gem", link: "https://buy.stripe.com/28E00lakQfx44bVaeU" },
                    { name: "Frost Ultra", price: "20", desc: "Unlimited VIP access, all features included.", icon: "fa-crown", link: "https://buy.stripe.com/28E00lakQfx44bVaeX" }
                ]
            }
        };

        function changeLang(lang) {
            document.getElementById('subtitle').innerText = data[lang].sub;
            const container = document.getElementById('products');
            container.innerHTML = "";
            data[lang].items.forEach(item => {
                container.innerHTML += `
                    <div class="card">
                        <i class="fas ${item.icon}"></i>
                        <h3>${item.name}</h3>
                        <p class="desc">${item.desc}</p>
                        <span class="price">£${item.price}</span>
                        <a href="${item.link}" class="btn" target="_blank">${data[lang].buy}</a>
                    </div>
                `;
            });
        }
        changeLang('tr'); // Başlangıç dili
    </script>
</body>
</html>
